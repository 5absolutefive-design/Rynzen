kind = "web"
previewPath = "/"
title = "Search Hub"
version = "1.0.0"
id = "artifacts/search-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22803

[services.development]
run = "pnpm --filter @workspace/search-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/search-hub", "run", "build" ]
publicDir = "artifacts/search-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22803"
BASE_PATH = "/"
